<div id="friends-page">

    <div id="friends-tabs">

        <button id="tab-friends" class="friends-tab">
            Επαφές
        </button>

        <button id="tab-requests" class="friends-tab active">
            Αιτήματα
        </button>

    </div>

    <div id="friends-section" class="friends-panel">

        <div id="friends-info" class="friends-info"></div>
        <div id="friends-list"></div>

    </div>

    <div id="requests-section" class="friends-panel hidden">

        <div id="requests-info" class="friends-info"></div>
        <div id="friend-requests"></div>

    </div>

    <!-- REMOVE FRIEND MODAL -->

    <div id="remove-friend-modal" class="modal-hidden">

        <div id="remove-friend-dialog">

            <p>Η επαφή θα διαγραφεί μόνιμα.</p>

            <div class="remove-friend-actions">

                <button id="cancel-remove-friend">Ακύρωση</button>

                <button id="confirm-remove-friend">Αφαίρεση</button>

            </div>

        </div>

    </div>

</div>
