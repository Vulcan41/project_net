<section class="project-member-layout">
    <div class="project-member-sidebar">

        <div class="project-member-sidebar-top">
            <div class="project-member-title" id="project-member-sidebar-title">Project</div>
            <div class="project-member-subtitle" id="project-member-sidebar-subtitle"></div>
            <div class="project-member-role-badge" id="project-member-sidebar-role"></div>

            <div class="project-member-owner" id="project-member-owner">
                <div class="project-member-owner-label">A project by:</div>

                <div class="project-member-owner-row">
                    <div class="project-member-owner-avatar"></div>
                    <div class="project-member-owner-username">Loading...</div>
                </div>


            </div>

        </div>


        <div id="project-member-menu" class="project-member-menu hidden">

            <div class="project-member-menu-label">Menu</div>

            <div class="project-member-menu-group">
                <button class="project-member-menu-btn active" data-section="overview">
                    <img src="./assets/project_overview_2.png" class="project-member-menu-icon" />
                    Overview
                </button>

                <button
                        id="project-member-members-btn"
                        class="project-member-menu-btn hidden"
                        data-section="members"
                >
                    <img src="./assets/project_members.png" class="project-member-menu-icon" />
                    Members
                </button>

                <button class="project-member-menu-btn" data-section="settings">
                    <img src="./assets/3333.png" class="project-member-menu-icon" />
                    Settings
                </button>
            </div>
        </div>

        <div class="project-member-sidebar-actions">
            <button
                    id="project-member-back-btn"
                    class="project-member-back-btn"
                    type="button"
            >
                Back to dashboard
            </button>
        </div>
    </div>

    <main class="project-member-body">
        <div id="project-member-error" class="project-member-error hidden"></div>
        <div id="project-member-body-content"></div>
    </main>
</section>
