<section class="project-layout">
    <div class="project-sidebar">

        <div class="project-sidebar-top">
            <div class="project-title" id="project-sidebar-title">Project</div>
            <div class="project-subtitle" id="project-sidebar-subtitle"></div>
            <div class="project-role-badge" id="project-sidebar-role"></div>
        </div>

        <div class="project-menu">

            <div class="project-menu-label">Menu</div>

            <div class="project-menu-group">
                <button class="project-menu-btn active" data-section="overview">
                    <img src="./assets/project_overview_2.png" class="project-menu-icon" />
                    Overview
                </button>

                <button class="project-menu-btn" data-section="members">
                    <img src="./assets/project_members.png" class="project-menu-icon" />
                    Members
                </button>
            </div>
        </div>

        <div class="project-sidebar-actions">
            <button id="project-upload-avatar-btn" class="project-upload-avatar-btn" type="button">
                Upload avatar
            </button>

            <input
                    id="project-avatar-input"
                    class="project-avatar-input"
                    type="file"
                    accept="image/*"
            />
        </div>
    </div>

    <main class="project-body">
        <div id="project-body-content"></div>
    </main>
</section>
