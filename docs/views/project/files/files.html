<div class="files-section">

  <div class="files-header">
    <div class="files-title-block">
      <div class="files-title">Files</div>

      <div class="files-breadcrumbs" id="files-breadcrumbs">
        <button class="files-breadcrumb-btn active" type="button">
          Root Folder
        </button>
      </div>
    </div>

    <div class="files-header-actions">
      <button
              id="files-back-folder-btn"
              class="files-secondary-btn hidden"
              type="button"
      >
        Back
      </button>

      <button id="files-create-folder-btn" class="files-secondary-btn" type="button">
        New folder
      </button>

      <button id="files-upload-btn" class="files-upload-btn" type="button">
        Upload file
      </button>
    </div>

    <input id="files-input" type="file" hidden />
  </div>

  <div id="files-upload-progress" class="files-upload-progress hidden">
    <div class="files-upload-progress-top">
      <span id="files-upload-progress-text">Uploading...</span>
      <span id="files-upload-progress-percent">0%</span>
    </div>

    <div class="files-upload-progress-bar">
      <div id="files-upload-progress-fill" class="files-upload-progress-fill"></div>
    </div>
  </div>

  <div class="files-shell">
    <div class="files-toolbar">
      <div class="files-toolbar-controls">
        <select id="files-sort-select" class="files-sort-select">
          <option value="name_asc">Name A → Z</option>
          <option value="name_desc">Name Z → A</option>
          <option value="newest_desc">Newest first</option>
          <option value="newest_asc">Oldest first</option>
          <option value="size_desc">Largest first</option>
          <option value="size_asc">Smallest first</option>
        </select>

        <input
                id="files-search-input"
                class="files-search-input"
                type="text"
                placeholder="Search files and folders..."
        />
      </div>

      <div class="files-count" id="files-count">0 items</div>
    </div>

    <div id="files-list" class="files-list">
      <div class="files-empty">Loading files...</div>
    </div>
  </div>

</div>
