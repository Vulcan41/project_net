<section class="project-other-view">
    <div class="project-other-topbar">
        <button id="project-other-back-btn" class="project-other-back-btn" type="button">
            ← Back
        </button>
    </div>

    <div id="project-other-error" class="project-other-error hidden"></div>

    <section class="project-other-shell">
        <div class="project-other-hero-card">
            <div class="project-other-hero-main">
                <div class="project-other-title-row">
                    <div id="project-other-avatar" class="project-other-avatar">
                        <span class="project-other-avatar-fallback">P</span>
                    </div>

                    <div class="project-other-title-block">
                        <h1 id="project-other-title" class="project-other-title">Loading...</h1>
                        <p id="project-other-description" class="project-other-description"></p>
                    </div>
                </div>

                <aside class="project-other-sidepanel">
                    <div class="project-other-action-card">
                        <button id="project-request-btn" class="project-request-btn" type="button">
                            Request to join
                        </button>

                        <div id="project-request-message" class="project-request-message hidden"></div>
                    </div>
                </aside>

                <div class="project-other-bottom-row">
                    <div id="project-other-meta" class="project-other-meta hidden">

                        <div
                                id="project-other-friends-members"
                                class="project-other-friends-members hidden"
                        >
                            <div class="project-other-friends-members-text" id="project-other-friends-members-text"></div>
                            <div class="project-other-friends-members-avatars" id="project-other-friends-members-avatars"></div>
                        </div>

                        <div
                                id="project-other-friends-divider"
                                class="project-other-meta-divider hidden"
                        ></div>

                        <div class="project-other-meta-group">
                            <p class="project-other-by-label">A PROJECT BY</p>

                            <div id="project-other-owner-block" class="project-other-owner-block">
                                <div class="project-other-owner-avatar">
                                    <img id="project-other-owner-avatar" src="" alt="owner avatar" />
                                </div>

                                <div class="project-other-owner-info">
                                    <div id="project-other-owner-name" class="project-other-owner-name"></div>
                                    <div id="project-other-owner-username" class="project-other-owner-username"></div>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>

            </div>
        </div>
    </section>
</section>
