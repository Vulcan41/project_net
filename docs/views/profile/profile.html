<div id="profile-page">

    <div id="top-area">

        <div id="profile-left">

            <img id="profile-avatar" src="" alt="Avatar">

            <div id="profile-main-info">
                <div id="profile-fullname"></div>
                <div id="profile-username"></div>
                <div id="profile-bio"></div>
            </div>

        </div>

        <div id="profile-stats">

            <div class="profile-stat">
                <div class="profile-stat-number" id="profile-friends-count">0</div>
                <div class="profile-stat-label">Επαφές</div>
            </div>

            <div class="profile-stat">
                <div class="profile-stat-number" id="profile-projects-count">0</div>
                <div class="profile-stat-label">Projects</div>
            </div>

        </div>

    </div>

    <!-- MIDDLE PART -->
    <div id="profile-content">
    </div>

    <!-- LOWER STRIP -->
    <div id="profile-actions">
        <button id="profile-edit-btn">Επεξεργασία</button>
    </div>

</div>
