<div class="basic-page">

    <div class="basic-header">
        <div class="basic-header-left">
            <h1 class="basic-title">Dashboard</h1>
            <span class="basic-subtitle">Your projects collection</span>
        </div>

        <div class="basic-header-right">
            <button id="create-project-btn" class="basic-create-btn">
                <span class="basic-btn-icon">+</span>
                New Project
            </button>
        </div>
    </div>

    <section class="basic-content">

        <div id="basic-empty-state" class="basic-empty-state hidden">
            <div class="basic-empty-icon">
                <img
                        src="./assets/no_project.png"
                        alt="No projects"
                        class="basic-empty-image"
                />
            </div>

            <h2 class="basic-empty-title">There are no projects yet</h2>

            <p class="basic-empty-text">
                Create your very first project or search for one
            </p>
        </div>

        <div class="basic-projects-wrap" id="basic-projects-wrap">
            <div class="basic-projects-grid" id="basic-projects-grid"></div>
        </div>

    </section>

</div>
