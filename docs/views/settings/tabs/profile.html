<div class="profile-header">

    <img id="avatar-preview" class="profile-avatar" src="/assets/user_icon_2.jpg">

    <div class="profile-preview">

        <h3>Saved Profile</h3>

        <p>
            <strong>Name:</strong>
            <span id="show-name"></span>
        </p>

        <p>
            <strong>Username:</strong>
            <span id="show-username"></span>
        </p>

        <p>
            <strong>Bio:</strong>
            <span id="show-bio"></span>
        </p>

    </div>

</div>

<div class="profile-editor">

    <h3>Edit Profile</h3>

    <input id="test-name" type="text" placeholder="Full name">

    <input id="test-username" type="text" placeholder="Username">

    <textarea id="test-bio" placeholder="Bio"></textarea>

    <button id="save-profile">Save Profile</button>

</div>
