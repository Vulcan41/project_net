<div id="profile-page">

    <div id="top-area">

        <div id="profile-left">

            <img id="profile-avatar" src="" alt="Avatar">

            <div id="profile-main-info">
                <div id="profile-fullname"></div>
                <div id="profile-username"></div>
                <div id="profile-bio"></div>
            </div>

        </div>

        <!-- FRIEND BUTTON -->
        <button id="add-friend-btn">Προσθήκη Φίλου</button>

        <div id="profile-stats">

            <div class="profile-stat">
                <span class="stat-value" id="profile-contacts">0</span>
                <span class="stat-label">Επαφές</span>
            </div>

            <div class="profile-stat">
                <span class="stat-value" id="profile-projects">0</span>
                <span class="stat-label">Πρότζεκτ</span>
            </div>

        </div>

    </div>

    <div id="profile-content"></div>

</div>
