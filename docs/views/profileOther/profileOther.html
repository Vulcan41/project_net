<div id="profile-page">

    <div id="top-area">

        <div id="profile-left">

            <img id="profile-avatar" src="" alt="Avatar">

            <div id="profile-main-info">

                <div id="profile-name-row">
                    <div id="profile-fullname"></div>

                    <button id="message-user-btn" class="hidden" data-tooltip="Μήνυμα">
                        <img src="assets/send_2.png" alt="Send message">
                    </button>
                </div>

                <div id="profile-username"></div>
                <div id="profile-bio"></div>

            </div>

        </div>

        <div id="profile-stats">

            <div id="friend-status-wrapper">

                <button id="add-friend-btn">
                    Προσθήκη Φίλου
                </button>

                <span id="profile-mutual-friends">0 κοινές επαφές</span>

            </div>

            <div class="profile-divider"></div>

            <div class="profile-stat">
                <div class="profile-stat-number" id="profile-friends-count">0</div>
                <div class="profile-stat-label">Επαφές</div>
            </div>

            <div class="profile-stat">
                <div class="profile-stat-number" id="profile-projects-count">0</div>
                <div class="profile-stat-label">Projects</div>
            </div>

        </div>

    </div>

    <div id="profile-content"></div>

</div>
