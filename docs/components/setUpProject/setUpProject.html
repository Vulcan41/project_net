<div id="setup-project-modal" class="setup-project-modal hidden">
    <div class="setup-project-backdrop"></div>

    <div
            class="setup-project-dialog"
            role="dialog"
            aria-modal="true"
            aria-labelledby="setup-project-title"
    >
        <div class="setup-project-split">

            <!-- LEFT: SVG -->
            <div class="setup-project-visual">
                <img src="./assets/setUp.svg" alt="Setup project" />
            </div>

            <!-- RIGHT: CONTENT -->
            <div class="setup-project-content">

                <div class="setup-project-header">
                    <div class="setup-project-header-text">
                        <p class="setup-project-kicker">New project</p>
                        <h2 id="setup-project-title" class="setup-project-title">
                            Create project
                        </h2>
                        <p class="setup-project-subtitle">
                            Set the basic details now. You can expand the project later.
                        </p>
                    </div>

                    <button
                            id="setup-project-close-btn"
                            class="setup-project-close-btn"
                            type="button"
                            aria-label="Close"
                    >
                        ✕
                    </button>
                </div>

                <form id="setup-project-form" class="setup-project-form">
                    <div class="setup-project-field">
                        <label class="setup-project-label" for="setup-project-name">
                            Project name
                        </label>
                        <input
                                id="setup-project-name"
                                class="setup-project-input"
                                type="text"
                                maxlength="80"
                                placeholder="e.g. Summer 2026"
                                required
                        />
                    </div>

                    <div class="setup-project-field">
                        <label class="setup-project-label" for="setup-project-description">
                            Description
                        </label>
                        <textarea
                                id="setup-project-description"
                                class="setup-project-textarea"
                                rows="4"
                                maxlength="280"
                                placeholder="Short summary of the project..."
                        ></textarea>
                    </div>

                    <div class="setup-project-field">
                        <label class="setup-project-label">Visibility</label>

                        <div class="setup-project-visibility-grid">
                            <label class="setup-project-option setup-project-option-public">
                                <input
                                        type="radio"
                                        name="setup-project-visibility"
                                        value="public"
                                        checked
                                />
                                <span class="setup-project-option-card">
                  <span class="setup-project-option-top">
                    <span class="setup-project-option-badge setup-project-option-badge-public">
                      Public
                    </span>
                  </span>
                  <span class="setup-project-option-title">
                    Public project
                  </span>
                  <span class="setup-project-option-text">
                    Visible in search. Other users can request to join.
                  </span>
                </span>
                            </label>

                            <label class="setup-project-option setup-project-option-private">
                                <input
                                        type="radio"
                                        name="setup-project-visibility"
                                        value="private"
                                />
                                <span class="setup-project-option-card">
                  <span class="setup-project-option-top">
                    <span class="setup-project-option-badge setup-project-option-badge-private">
                      Private
                    </span>
                  </span>
                  <span class="setup-project-option-title">
                    Private project
                  </span>
                  <span class="setup-project-option-text">
                    Hidden from search. Access is controlled by the owner.
                  </span>
                </span>
                            </label>
                        </div>
                    </div>

                    <div id="setup-project-error" class="setup-project-error hidden"></div>

                    <div class="setup-project-footer">
                        <button
                                id="setup-project-cancel-btn"
                                class="setup-project-cancel-btn"
                                type="button"
                        >
                            Ακύρωση
                        </button>

                        <button
                                id="setup-project-submit-btn"
                                class="setup-project-submit-btn"
                                type="submit"
                        >
                            Δημιουργία
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
