<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>noesis</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>

<div id="page">

  <!-- HEADER -->
  <header id="top-header">

    <img id="header-logo" src="assets/logo_5.png" alt="Logo">

    <div id="header-content">

      <div class="tooltip-wrapper" data-tooltip="Προφίλ">
        <button id="user-btn">
          <img src="assets/user_icon_2.jpg" alt="User">
        </button>
      </div>
      <div id="user-info">
        <div id="user-name">Username</div>
      </div>
      <div id="user-actions">
        <button class="user-action-btn"
                id="friends-btn"
                data-tooltip="Επαφές">
          <img src="assets/friends.png" alt="friends">
        </button>
        <button class="user-action-btn"
                id="messages-btn"
                data-tooltip="Μηνύματα">
          <img src="assets/1111.png" alt="Messages">
        </button>
        <button class="user-action-btn"
                id="notifications-btn"
                data-tooltip="Ειδοποιήσεις">
          <img src="assets/2222.png" alt="">
        </button>
        <button class="user-action-btn"
                id="settings-btn"
                data-tooltip="Ρυθμίσεις">
          <img src="assets/3333.png" alt="Settings">
        </button>
      </div>

      <button class="user-action-btn"
              id="credits-indicator"
              data-tooltip="Credits">
        <span id="credits-value">--</span>
        <span class="credits-star">✦</span>
      </button>

      <div id="header-search">
        <input type="text" placeholder="Αναζήτηση...">
      </div>

      <button class="user-action-btn"
              id="logout-btn"
              data-tooltip="Αποσύνδεση">
        <img src="assets/logout.png" alt="Logout">
      </button>
    </div>


  </header>

  <!-- MAIN AREA -->
  <main id="home-layout">

    <!-- LEFT PANEL -->
    <aside id="left-panel"></aside>

    <!-- RIGHT / MAIN CONTENT (empty for now) -->
    <section id="main-content"></section>

  </main>

</div>

<script type="module" src="home.js"></script>
</body>
</html>
