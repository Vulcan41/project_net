<div id="register-overlay">

    <div id="register-modal">

        <h2>Δημιουργία Λογαριασμού</h2>

        <!-- AVATAR -->

        <div id="avatar-section">

            <label id="avatar-upload">

                <div id="avatar-image-wrapper">
                    <img id="register-avatar-preview" src="assets/avatar.png">
                    <div id="avatar-mask"></div>
                </div>

                <div id="avatar-overlay">Αλλαγή</div>

                <input type="file" id="register-avatar-input" accept="image/*">

            </label>

        </div>

        <!-- ACCOUNT INFO -->

        <h3 class="register-section">ΣΤΟΙΧΕΙΑ ΛΟΓΑΡΙΑΣΜΟΥ</h3>

        <div class="form-field">
            <input
                    id="register-email"
                    type="email"
                    placeholder="Email"
                    autocomplete="off"
            >
            <div class="field-hint">
                Θα χρησιμοποιηθεί για σύνδεση
            </div>
        </div>

        <div class="form-field password-wrapper">

            <input
                    id="register-password"
                    type="password"
                    placeholder="Κωδικός Πρόσβασης"
                    autocomplete="new-password"
            >

            <button type="button" id="toggle-password" class="password-eye">
                <img id="password-icon" src="assets/no_view.png">
            </button>

            <div class="field-hint">
                Επιλέξτε έναν ισχυρό κωδικό
            </div>

        </div>

        <!-- PROFILE INFO -->

        <h3 class="register-section">ΣΤΟΙΧΕΙΑ ΠΡΟΦΙΛ</h3>

        <div class="form-field username-field">
            <span class="username-prefix">@</span>
            <input
                    id="register-username"
                    type="text"
                    placeholder="Όνομα Χρήστη"
                    autocomplete="off"
            >
            <div class="field-hint">
                Το όνομα που θα βλέπουν οι χρήστες
            </div>
        </div>

        <div class="form-field">
            <input
                    id="register-fullname"
                    type="text"
                    placeholder="Όνομα"
                    autocomplete="off"
            >
            <div class="field-hint">
                Το πραγματικό σας όνομα
            </div>
        </div>

        <div class="form-field">
            <input
                    id="register-bio"
                    type="text"
                    placeholder="Ιδιότητα"
                    autocomplete="off"
            >
            <div class="field-hint">
                Μια σύντομη περιγραφή
            </div>
        </div>



        <!-- BUTTONS -->

        <div class="auth-buttons">

            <button class="glow-btn" id="register-cancel">
                <span>Ακύρωση</span>
            </button>
            <button class="glow-btn" id="register-submit">
                <span>Δημιουργία</span>
            </button>

        </div>

    </div>

</div>
