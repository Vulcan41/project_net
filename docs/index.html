<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>noesis</title>
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="register/register.css">
</head>
<body>

<div id="page">

  <header id="top-header">
    <div class="header-logo">
      <img src="assets/logo_5.png" alt="Logo">
    </div>

    <nav class="header-menu">
      <button class="active">HOME</button>
      <button>ABOUT</button>
      <button>CONTACT</button>
    </nav>
  </header>

  <div class="header-divider"></div>

  <main id="main-layout">

    <section id="left-panel">

      <div class="panel-item">
        <h1 class="panel-label label-1">All-In-One eHub</h1>
      </div>

      <div class="panel-item">
        <h1 class="panel-label label-2">Processing Power</h1>
      </div>

      <div class="panel-item">
        <h1 class="panel-label label-3">Networking</h1>
      </div>

      <p class="panel-description">
        A unified environment for digital collaboration,
        productivity, and connection.
      </p>

    </section>

    <section id="right-panel">
      <div id="auth">
        <h2 class="auth-title">Welcome</h2>
        <p class="auth-subtitle">Sign in to continue<br>or create a new account</p>

        <input
                id="email"
                type="email"
                placeholder="Email"
                autocomplete="off"
        >

        <input
                id="password"
                type="password"
                placeholder="Password"
                autocomplete="new-password"
        >

        <label class="keep-signed">
          <span>Keep me signed in</span>

          <div class="toggle">
            <input type="checkbox" id="keepSignedIn">
            <span class="slider"></span>
          </div>
        </label>

        <div class="auth-buttons">
          <button class="glow-btn" id="signup-btn">
            <span>Sign Up</span>
          </button>
          <button class="glow-btn" id="login-btn">
            <span>Log In</span>
          </button>
        </div>
      </div>
    </section>

  </main>

</div>

<script type="module" src="index.js"></script>
</body>
</html>
